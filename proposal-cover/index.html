<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposta Comercial — Ecocarga</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <article class="cover" role="document" aria-label="Capa da proposta comercial Ecocarga">
    <header class="cover__header">
      <img
        class="cover__logo-small"
        src="assets/ecocarga-logo-small.png?v=5"
        alt="Ecocarga"
        width="185"
        height="48"
      />
    </header>

    <section class="cover__hero" aria-label="Identidade da proposta">
      <div class="cover__hero-stack">
        <div class="cover__hero-content">
          <div class="cover__hero-art" aria-hidden="true">
            <img
              class="cover__lightning"
              src="assets/lightning.svg?v=5"
              alt=""
              width="380"
              height="420"
            />
          </div>

          <img
            class="cover__logo-main"
            src="assets/ecocarga-logo-main.png?v=5"
            alt="Ecocarga — mobilidade elétrica"
            width="336"
            height="128"
          />

          <div class="cover__proposta-pill">
            <span class="cover__proposta-text">Proposta</span>
          </div>

          <h1 class="cover__comercial">Comercial</h1>

          <div class="proposal-meta">
            <p class="client-name">{{CLIENT_NAME}}</p>
            <p class="consultant-name">
              <span class="consultant-label">Consultor Comercial:</span>
              <span class="consultant-value">{{SALES_CONSULTANT}}</span>
            </p>
          </div>
        </div>
      </div>
    </section>

    <footer class="cover__footer">
      <div class="cover__footer-contact">
        <p class="cover__contact-line">
          <img src="assets/phone-icon.svg" alt="" width="18" height="18" class="cover__icon" />
          <span>(11) 91283-1823</span>
        </p>
        <p class="cover__contact-line">
          <img src="assets/link-icon.svg" alt="" width="18" height="18" class="cover__icon" />
          <span>ecocargamobi.com.br</span>
        </p>
      </div>

      <div class="cover__copyright">
        <p>Copyright © 2026 Ecocarga Inc. Todos os direitos reservados.</p>
        <p>Ecocarga Mobi Ltda. CNPJ: 00.623.904/0003-35</p>
      </div>
    </footer>
  </article>
</body>
</html>
